server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /kotlin/ {
        proxy_pass http://kotlin-service.insurance-direct.svc.cluster.local:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /python/ {
        proxy_pass http://python-service.insurance-direct.svc.cluster.local:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
